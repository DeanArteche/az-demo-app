name: "Reusable CI"
on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs: 
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ inputs.service }} apps/${{ inputs.service }}
