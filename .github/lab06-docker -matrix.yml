name: "Lab 06 - Docker Matrix"
on: { workflow_dispatch: {} }
jobs:
  docker-build:
     runs-on: ubuntu-latest
     strategy:
      matrix:
        service: [python-api, node-api]
     steps:
       - uses: actions/checkout@v4

       - name: Build Docker image
         run: docker build -t ${{ matrix.service }} apps/${{ matrix.service }}

       - name: Show Docker images
         run: docker images